<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My applications - TalentBoard</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container">
    <h1>My applications</h1>
    <p class="muted" th:if="${#lists.isEmpty(applications)}">You have not applied to any vacancy yet.</p>

    <div class="card" th:each="a : ${applications}">
        <h2 th:text="${a.vacancyTitle}">Vacancy</h2>
        <p class="muted">
            Applied on <span th:text="${a.applicationDate}">date</span> ·
            Status: <span class="badge" th:text="${a.status}">STATUS</span>
        </p>

        <h3>My interviews</h3>
        <table>
            <thead>
            <tr><th>Date</th><th>Time</th><th>Type</th><th>Responsible</th><th>Result</th></tr>
            </thead>
            <tbody>
            <tr th:each="i : ${interviewsByApplication.get(a.id)}">
                <td th:text="${i.scheduledDate}">date</td>
                <td th:text="${i.scheduledTime}">time</td>
                <td th:text="${i.type}">type</td>
                <td th:text="${i.responsibleName}">responsible</td>
                <td><span class="badge" th:text="${i.result}">result</span></td>
            </tr>
            <tr th:if="${#lists.isEmpty(interviewsByApplication.get(a.id))}">
                <td colspan="5" class="muted">No interviews scheduled yet.</td>
            </tr>
            </tbody>
        </table>
    </div>
    <a th:href="@{/vacancies}">Browse vacancies</a>
</div>
</body>
</html>

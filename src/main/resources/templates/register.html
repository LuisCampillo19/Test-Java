<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register - TalentBoard</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>
<div class="container-narrow">
    <div class="card">
        <h1>Create account</h1>
        <p class="muted">You will be registered as a candidate</p>

        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post">
            <label for="fullName">Full name</label>
            <input type="text" id="fullName" th:field="*{fullName}"/>
            <div class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>

            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}"/>
            <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>

            <label for="password">Password</label>
            <input type="password" id="password" th:field="*{password}"/>
            <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>

            <button class="btn" type="submit">Register</button>
        </form>
        <p class="muted" style="margin-top:1rem;">
            Already registered? <a th:href="@{/login}">Sign in</a>
        </p>
    </div>
</div>
</body>
</html>

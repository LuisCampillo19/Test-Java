services:
  db:
    image: postgres:16-alpine
    container_name: talentboard-db
    environment:
      POSTGRES_DB: ${DB_NAME:-talentboard}
      POSTGRES_USER: ${DB_USERNAME:-talentboard}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-talentboard}
    ports:
      # Host 5433 -> container 5432 to avoid clashing with a PostgreSQL
      # already running on the host's 5432. The app reaches the DB over the
      # internal Docker network (db:5432), so this only affects host access.
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-talentboard}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: talentboard-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-talentboard}
      DB_USERNAME: ${DB_USERNAME:-talentboard}
      DB_PASSWORD: ${DB_PASSWORD:-talentboard}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

volumes:
  db_data:

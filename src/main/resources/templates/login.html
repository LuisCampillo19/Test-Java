<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login - TalentBoard</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>
<div class="container-narrow">
    <div class="card">
        <h1>TalentBoard</h1>
        <p class="muted">Sign in to continue</p>

        <div class="alert alert-error" th:if="${param.error}">Invalid email or password.</div>
        <div class="alert alert-success" th:if="${param.logout}">You have been logged out.</div>
        <div class="alert alert-success" th:if="${param.registered}">Account created. Please sign in.</div>

        <form th:action="@{/login}" method="post">
            <label for="username">Email</label>
            <input type="email" id="username" name="username" required/>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required/>

            <button class="btn" type="submit">Sign in</button>
        </form>
        <p class="muted" style="margin-top:1rem;">
            No account? <a th:href="@{/register}">Register as candidate</a>
        </p>
    </div>
</div>
</body>
</html>
